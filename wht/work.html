<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的作品墙</title>
    <link rel="stylesheet" href="wht-common.css">
    <style>
        /* 页面容器 */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* 个人作品主页样式 */
        .user-wall-top {
            background: #fff;
            padding: 16px;
            padding-bottom: 12px;
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .user-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .user-desc {
            flex: 1;
        }

        .user-name {
            font-size: 20px;
            font-weight: bold;
        }

        .user-tip {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .user-banner {
            display: none;
        }

        .user-tag-wrap {
            display: flex;
            gap: 8px;
            padding: 0 12px;
            margin-top: 16px;
            margin-bottom: 12px;
        }

        .user-tag {
            padding: 4px 10px;
            background: #e8f5e9;
            border-radius: 16px;
            font-size: 12px;
            color: #4CAF50;
        }

        .user-stat {
            display: flex;
            background: #fff;
            padding: 12px 0;
            text-align: center;
            margin: 0 12px;
            border-radius: 12px;
        }

        .stat-item {
            flex: 1;
        }

        .stat-num {
            font-size: 20px;
            font-weight: bold;
            color: #4CAF50;
        }

        .stat-text {
            font-size: 12px;
            color: #666;
        }

        /* 三列作品网格 */
        .user-work-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 10px;
        }

        .grid-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: transparent;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }

        .grid-item:active {
            transform: scale(0.96);
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ✅ 作品卡片点赞数（左下角） */
        .grid-like {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        /* ✅ 小红书风格作品详情页（和学习中心完全一致） */
        .detail-header {
            position: fixed;
            top: 44px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: var(--app-max-width, 430px);
            height: 50px;
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
        }

        .detail-content {
            padding-top: 50px;
            padding-bottom: 60px;
        }

        .detail-img {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            display: block;
            background: #000;
        }

        .detail-author {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #fff;
        }

        .author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
        }

        .author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-name {
            font-weight: 500;
            flex: 1;
        }

        .follow-btn {
            background: #ff4757;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        .follow-btn.followed {
            background: #e8e8e8;
            color: #666;
        }

        .detail-actions {
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            background: #fff;
            border-top: 1px solid #f5f5f5;
            border-bottom: 1px solid #f5f5f5;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #333;
            cursor: pointer;
        }

        .action-item .icon {
            font-size: 22px;
        }

        .action-item.liked .icon {
            color: #ff4757;
        }

        .action-item.collected .icon {
            color: #ffb300;
        }

        .detail-desc {
            padding: 16px;
            background: #fff;
            margin-bottom: 12px;
        }

        .comments-title {
            padding: 12px 16px;
            font-weight: 500;
            background: #fff;
            border-bottom: 1px solid #f5f5f5;
        }

        .comment-item {
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            gap: 12px;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .comment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .comment-content {
            flex: 1;
        }

        .comment-user {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .comment-text {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .comment-time {
            font-size: 12px;
            color: #999;
        }

        /* 底部评论输入框 */
        .comment-input-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: var(--app-max-width, 430px);
            background: #fff;
            padding: 10px 16px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .comment-input {
            flex: 1;
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            outline: none;
        }

        .send-btn {
            background: #4CAF50;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body data-active-module="wanhua">
    <!-- 顶部导航 -->
    <div class="top-nav">
        <div class="top-nav-item" onclick="window.location.href='index.html'">课程总览</div>
        <div class="top-nav-item" onclick="window.location.href='study.html'">学习中心</div>
        <div class="top-nav-item active">作品墙</div>
        <div class="top-nav-item" onclick="window.location.href='order.html'">我的订单</div>
    </div>

    <!-- 底部导航栏 -->
        <nav class="global-bottom-nav">
        <button type="button" class="nav-item" data-nav-module="baixiaotang"><span class="nav-icon">💡</span><span>百晓堂</span></button>
        <button type="button" class="nav-item active" data-nav-module="wanhua"><span class="nav-icon">📺</span><span>万花筒</span></button>
        <button type="button" class="nav-item" data-nav-module="gongxuetang"><span class="nav-icon">🌿</span><span>共学堂</span></button>
        <button type="button" class="nav-item" data-nav-module="chuanjia"><span class="nav-icon">📤</span><span>传家录</span></button>
        <button type="button" class="nav-item" data-nav-module="ziliudi"><span class="nav-icon">🏠</span><span>自留地</span></button>
    </nav>

    <!-- 作品墙主页 -->
    <div id="pageWallHome" class="page active">
        <!-- 用户头部信息 -->
        <div class="user-wall-top">
            <div class="user-avatar">
                <img src="wwanhuatong/wanhuatongtouxiang.jpg" alt="李同学头像" onerror="this.style.display='none'">
            </div>
            <div class="user-desc">
                <div class="user-name">李同学</div>
                <div class="user-tip">主攻艺术类课程，书画、水彩日常练习</div>
            </div>
        </div>

        <!-- 标签 -->
        <div class="user-tag-wrap">
            <span class="user-tag">水彩入门</span>
            <span class="user-tag">硬笔书法</span>
            <span class="user-tag">风景写生</span>
        </div>

        <!-- 统计 -->
        <div class="user-stat">
            <div class="stat-item">
                <div class="stat-num" id="workTotal">0</div>
                <div class="stat-text">作品</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="totalLikes">0</div>
                <div class="stat-text">赞</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">23</div>
                <div class="stat-text">收藏</div>
            </div>
        </div>

        <!-- 三列作品网格（仅本人作品） -->
        <div class="user-work-grid" id="userGridBox"></div>
    </div>

    <!-- ✅ 作品详情页 -->
    <div id="pageWorkDetail" class="page">
        <div class="detail-header">
            <div class="back-btn" onclick="show(detailBackPage)">←</div>
            <div class="header-title">作品详情</div>
           
        </div>
        <div class="detail-content">
            <img id="detailImg" class="detail-img" src="" alt="作品大图">
            <div class="detail-author">
                <div class="author-avatar">
                    <img id="detailAuthorAvatar" src="wwanhuatong/wanhuatongtouxiang.jpg" alt="作者头像">
                </div>
                <div class="author-name" id="detailAuthorName"></div>
                <button class="follow-btn" id="detailFollowBtn" type="button">+ 关注</button>
            </div>
            <div class="detail-actions">
                <div class="action-item" id="detailLikeBtn">
                    <span class="icon">🤍</span>
                    <span id="detailLikeCount">0</span>
                </div>
                <div class="action-item" id="detailCommentBtn">
                    <span class="icon">💬</span>
                    <span id="detailCommentCount">0</span>
                </div>
                <div class="action-item" id="detailCollectBtn">
                    <span class="icon">⭐</span>
                    <span id="detailCollectText">收藏</span>
                </div>
                <div class="action-item" id="detailShareBtn">
                    <span class="icon">↗️</span>
                    <span>分享</span>
                </div>
            </div>
            <div class="detail-desc" id="detailDesc"></div>
            <div class="comments-title">评论区</div>
            <div id="commentList"></div>
        </div>
        <div class="comment-input-bar">
            <input type="text" class="comment-input" id="commentInput" placeholder="说点什么...">
            <button class="send-btn" id="sendCommentBtn">发送</button>
        </div>
    </div>

    <script src="wht-toast.js"></script>
    <script>
        const user = '李同学';
        let currentWorkOriginalIndex = -1;
        let detailBackPage = 'pageWallHome';

        function getFollowedUsers() {
            return JSON.parse(localStorage.getItem('whtFollowedUsers') || '[]');
        }

        function saveFollowedUsers(list) {
            localStorage.setItem('whtFollowedUsers', JSON.stringify(list));
        }

        function isAuthorFollowed(author) {
            return getFollowedUsers().includes(author);
        }

        function toggleFollowAuthor(author) {
            const list = getFollowedUsers();
            const idx = list.indexOf(author);
            if (idx === -1) {
                list.push(author);
                showWhtToast('已关注 ' + author);
            } else {
                list.splice(idx, 1);
                showWhtToast('已取消关注');
            }
            saveFollowedUsers(list);
            updateFollowState(author);
        }

        function updateFollowState(author) {
            const btn = document.getElementById('detailFollowBtn');
            if (!btn) return;
            if (author === user) {
                btn.style.display = 'none';
                return;
            }
            btn.style.display = '';
            if (isAuthorFollowed(author)) {
                btn.textContent = '已关注';
                btn.classList.add('followed');
            } else {
                btn.textContent = '+ 关注';
                btn.classList.remove('followed');
            }
        }

        function updateCollectState(work) {
            const btn = document.getElementById('detailCollectBtn');
            const text = document.getElementById('detailCollectText');
            if (!btn || !text) return;
            if (work.isCollected) {
                btn.classList.add('collected');
                text.textContent = '已收藏';
            } else {
                btn.classList.remove('collected');
                text.textContent = '收藏';
            }
        }

        function toggleCollect(originalIndex) {
            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const work = hwList[originalIndex];
            if (!work) return;
            work.isCollected = !work.isCollected;
            localStorage.setItem('hwList', JSON.stringify(hwList));
            updateCollectState(work);
            showWhtToast(work.isCollected ? '已收藏' : '已取消收藏');
        }

        function shareWork(work) {
            const text = (work.user || '同学') + '的作品：' + (work.content || '');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    showWhtToast('内容已复制，可分享给好友');
                }).catch(function() {
                    showWhtToast('分享成功');
                });
            } else {
                showWhtToast('分享成功');
            }
        }

        const MY_DEFAULT_WORKS = [
            {
                user: user,
                course: '水彩画入门课10节',
                content: '水彩入门第一幅作品，尝试基本调色与湿画法',
                img: 'wwanhuatong/work1.jpg',
                time: '2026/6/10 14:30:00',
                likeCount: 0,
                isLiked: false,
                isCollected: false,
                comments: []
            },
            {
                user: user,
                course: '水彩画入门课10节',
                content: '湖边柳树风景写生，练习自然光影表现',
                img: 'wwanhuatong/work2.jpg',
                time: '2026/6/12 10:15:00',
                likeCount: 0,
                isLiked: false,
                isCollected: false,
                comments: []
            },
            {
                user: user,
                course: '水彩画入门课10节',
                content: '硬笔书法撇笔画练习，掌握起笔收笔技巧',
                img: 'wwanhuatong/work3.jpg',
                time: '2026/6/14 16:45:00',
                likeCount: 0,
                isLiked: false,
                isCollected: false,
                comments: []
            },
            {
                user: user,
                course: '水彩画入门课10节',
                content: '苹果静物写生，尝试塑造体积感',
                img: 'wwanhuatong/work4.jpg',
                time: '2026/6/15 09:20:00',
                likeCount: 0,
                isLiked: false,
                isCollected: false,
                comments: []
            }
        ];

        // 初始化本人默认 4 件作品（work1 ~ work4）
        function forceInitDefaultWorks() {
            let hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const myWorkImgs = MY_DEFAULT_WORKS.map(function(w) { return w.img; });
            const hasMyDefaults = myWorkImgs.every(function(img) {
                return hwList.some(function(h) {
                    return h.user === user && h.img === img;
                });
            });

            if (!hasMyDefaults) {
                MY_DEFAULT_WORKS.forEach(function(def) {
                    const exists = hwList.some(function(h) {
                        return h.user === user && h.img === def.img;
                    });
                    if (!exists) hwList.unshift(def);
                });
                localStorage.setItem('hwList', JSON.stringify(hwList));
            }

            hwList.forEach(function(work) {
                if (typeof work.isCollected === 'undefined') work.isCollected = false;
                if (typeof work.likeCount === 'undefined') work.likeCount = 0;
                if (typeof work.isLiked === 'undefined') work.isLiked = false;
                if (typeof work.comments === 'undefined') work.comments = [];
            });
            localStorage.setItem('hwList', JSON.stringify(hwList));
        }

        // ✅ 页面切换
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ✅ 渲染作品墙（带点赞数和点击事件）
        function renderUserWall() {
            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const myAllWork = [];
            let totalLikes = 0;

            // 遍历原始数组，保存原始索引并计算总点赞数
            hwList.forEach((work, originalIndex) => {
                if (work.user === user) {
                    myAllWork.push({
                        ...work,
                        originalIndex: originalIndex
                    });
                    totalLikes += work.likeCount || 0;
                }
            });

            myAllWork.sort(function(a, b) {
                const numA = (a.img || '').match(/work(\d+)\.jpg/);
                const numB = (b.img || '').match(/work(\d+)\.jpg/);
                if (numA && numB) return parseInt(numA[1], 10) - parseInt(numB[1], 10);
                if (numA) return -1;
                if (numB) return 1;
                return (b.time || '').localeCompare(a.time || '');
            });

            const grid = document.getElementById('userGridBox');
            document.getElementById('workTotal').innerText = myAllWork.length;
            document.getElementById('totalLikes').innerText = totalLikes; // 更新总点赞数
            
            if (myAllWork.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">暂无作品</div>';
                return;
            }
            
            grid.innerHTML = myAllWork.map(work => {
                const likeCount = work.likeCount || 0;
                return `
                <div class="grid-item" data-original-index="${work.originalIndex}">
                    ${work.img ? `<img src="${work.img}" alt="作品" onerror="this.style.display='none'">` : ''}
                    <div class="grid-like">❤️ ${likeCount}</div>
                </div>
            `;
            }).join('');

            // 绑定点击事件
            bindGridItemEvents();
        }

        // ✅ 绑定作品网格点击事件
        function bindGridItemEvents() {
            document.querySelectorAll('.grid-item').forEach(item => {
                item.onclick = function() {
                    const originalIndex = parseInt(this.dataset.originalIndex);
                    openWorkDetail(originalIndex);
                };
            });
        }

        // ✅ 打开作品详情页（和学习中心逻辑完全一致）
        function openWorkDetail(originalIndex) {
            currentWorkOriginalIndex = originalIndex;
            detailBackPage = 'pageWallHome';
            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const work = hwList[originalIndex];
            if (!work) return;

            document.getElementById('detailImg').src = work.img;
            document.getElementById('detailAuthorName').innerText = work.user;
            document.getElementById('detailDesc').innerText = work.content;

            updateDetailLikeState(work);
            document.getElementById('detailCommentCount').innerText = (work.comments || []).length;
            updateFollowState(work.user);
            if (typeof work.isCollected === 'undefined') work.isCollected = false;
            updateCollectState(work);
            renderCommentList(work.comments);

            show('pageWorkDetail');
        }

        // ✅ 点赞/取消点赞
        function toggleLike(originalIndex) {
            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const work = hwList[originalIndex];
            
            if (typeof work.likeCount === 'undefined') work.likeCount = 0;
            if (typeof work.isLiked === 'undefined') work.isLiked = false;
            
            if (work.isLiked) {
                work.likeCount--;
                work.isLiked = false;
            } else {
                work.likeCount++;
                work.isLiked = true;
            }
            
            localStorage.setItem('hwList', JSON.stringify(hwList));
            renderUserWall();
            
            // 如果正在查看详情页，也更新详情页的点赞状态
            if (currentWorkOriginalIndex === originalIndex) {
                updateDetailLikeState(work);
            }
        }

        // 更新详情页点赞状态
        function updateDetailLikeState(work) {
            const likeBtn = document.getElementById('detailLikeBtn');
            const likeCount = document.getElementById('detailLikeCount');
            
            likeCount.innerText = work.likeCount || 0;
            if (work.isLiked) {
                likeBtn.classList.add('liked');
                likeBtn.querySelector('.icon').innerText = '❤️';
            } else {
                likeBtn.classList.remove('liked');
                likeBtn.querySelector('.icon').innerText = '🤍';
            }
        }

        // 渲染评论列表
        function renderCommentList(comments) {
            const box = document.getElementById('commentList');
            
            if (!comments || comments.length === 0) {
                box.innerHTML = '<div style="text-align:center;padding:30px;color:#999;">暂无评论，快来抢沙发吧~</div>';
                return;
            }
            
            box.innerHTML = comments.map(c => `
                <div class="comment-item">
                    <div class="comment-avatar">
                        <img src="wwanhuatong/wanhuatongtouxiang.jpg" alt="评论者头像">
                    </div>
                    <div class="comment-content">
                        <div class="comment-user">${c.user}</div>
                        <div class="comment-text">${c.content}</div>
                        <div class="comment-time">${c.time}</div>
                    </div>
                </div>
            `).join('');
        }

        // ✅ 提交评论
        function submitComment() {
            const input = document.getElementById('commentInput');
            const content = input.value.trim();
            
            if (!content) {
                showWhtToast('请输入评论内容');
                return;
            }
            
            if (currentWorkOriginalIndex === -1) return;
            
            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const work = hwList[currentWorkOriginalIndex];
            
            if (!work.comments) work.comments = [];
            
            // 添加新评论
            work.comments.unshift({
                user: user,
                content: content,
                time: new Date().toLocaleString()
            });
            
            localStorage.setItem('hwList', JSON.stringify(hwList));
            
            // 更新页面
            document.getElementById('detailCommentCount').innerText = work.comments.length;
            renderCommentList(work.comments);
            input.value = '';

            showWhtToast('评论发布成功');
        }

        document.getElementById('detailFollowBtn').onclick = function() {
            if (currentWorkOriginalIndex === -1) return;
            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const work = hwList[currentWorkOriginalIndex];
            if (work && work.user !== user) toggleFollowAuthor(work.user);
        };

        document.getElementById('detailCollectBtn').onclick = function() {
            if (currentWorkOriginalIndex !== -1) toggleCollect(currentWorkOriginalIndex);
        };

        document.getElementById('detailShareBtn').onclick = function() {
            if (currentWorkOriginalIndex === -1) return;
            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const work = hwList[currentWorkOriginalIndex];
            if (work) shareWork(work);
        };

        document.getElementById('detailCommentBtn').onclick = function() {
            const list = document.getElementById('commentList');
            if (list) list.scrollIntoView({ behavior: 'smooth', block: 'start' });
            document.getElementById('commentInput').focus();
        };

        // 事件绑定
        // 详情页点赞按钮
        document.getElementById('detailLikeBtn').onclick = function() {
            if (currentWorkOriginalIndex !== -1) {
                toggleLike(currentWorkOriginalIndex);
            }
        };
        
        // 发送评论按钮
        document.getElementById('sendCommentBtn').onclick = submitComment;
        
        // 回车发送评论
        document.getElementById('commentInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitComment();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            if (window.XueWuyaAuth && XueWuyaAuth.blockGuestPage('index.html')) return;
            forceInitDefaultWorks();
            renderUserWall();
        });
    </script>
    <script src="../js/voice-mode.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
</body>
</html>
