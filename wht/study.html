<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学习中心</title>
    <link rel="stylesheet" href="wht-common.css">
    <style>
        /* 页面容器 */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* 头部 */
        .header {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 44px;
            z-index: 99;
        }

        .back-btn {
            font-size: 20px;
            cursor: pointer;
            color: #333;
        }

        .header-title {
            font-size: 17px;
            color: #333;
            font-weight: 500;
        }

        /* 空状态 */
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #999;
            font-size: 15px;
        }

        /* 视频封面 */
        .video {
            width: 100%;
            height: 200px;
            overflow: hidden;
        }

        .video img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .section {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f7f7f7;
        }

        .section-title-text {
            font-weight: 600;
            font-size: 15px;
            color: #333;
        }

        .chapter-list {
            padding: 8px 12px 16px;
        }

        .chapter-block {
            background: #fff;
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .chapter-header {
            display: flex;
            align-items: center;
            padding: 16px;
            cursor: pointer;
            user-select: none;
            gap: 8px;
        }

        .chapter-header:active {
            background: #fafafa;
        }

        .chapter-index {
            font-size: 14px;
            color: #4CAF50;
            font-weight: 600;
            flex-shrink: 0;
        }

        .chapter-title {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .chapter-meta {
            font-size: 12px;
            color: #999;
            flex-shrink: 0;
        }

        .chapter-arrow {
            font-size: 11px;
            color: #999;
            transition: transform 0.25s ease;
            flex-shrink: 0;
        }

        .chapter-block.expanded .chapter-arrow {
            transform: rotate(180deg);
        }

        .chapter-lessons {
            display: none;
            padding: 4px 12px 12px;
            border-top: 1px solid #f0f0f0;
        }

        .chapter-block.expanded .chapter-lessons {
            display: block;
        }

        .lesson {
            background: #f9faf9;
            margin-top: 8px;
            padding: 12px 14px;
            border-radius: 10px;
            border-left: 4px solid #4CAF50;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lesson:active {
            background: #f0f7f0;
        }

        .lesson-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .lesson-info {
            flex: 1;
            min-width: 0;
        }

        .lesson-title {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
        }

        .lesson-duration {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .lesson.completed {
            border-left-color: #81c784;
            background: #f1f8f2;
        }

        .lesson-status {
            font-size: 12px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .lesson-status.done {
            color: #4CAF50;
        }

        .lesson-status.todo {
            color: #bbb;
        }

        .course-progress-card {
            background: #fff;
            margin: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-label {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }

        .progress-text {
            font-size: 14px;
            color: #4CAF50;
            font-weight: 500;
        }

        .progress-bar-track {
            height: 8px;
            background: #e8f5e9;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #66bb6a, #4CAF50);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .chapter-progress {
            font-size: 11px;
            color: #4CAF50;
            margin-right: 4px;
        }

        .hwBtn {
            background: #4CAF50;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* 作业页 */
        .hwCard {
            background: #fff;
            margin: 12px;
            padding: 16px;
            border-radius: 12px;
        }

        /* 班主任头像 */
        .teacher-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .teacher-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .excellent-entry {
            background: #fff;
            margin: 0 12px;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-top: 10px;
        }

        .submitBtn {
            background: #4CAF50;
            color: #fff;
            width: 90%;
            margin: 20px auto;
            display: block;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            border: none;
            background: transparent;
            border-radius: 0;
            padding: 0;
            margin: 0;
            min-height: 120px;
            font-size: 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            color: #333;
        }

        textarea::placeholder {
            color: #999;
        }

        .submit-form-wrap {
            padding: 16px;
        }

        .input-card {
            background: #E1E8E1;
            border-radius: 18px;
            padding: 14px;
        }

        .input-card__textarea {
            width: 100%;
            min-height: 120px;
        }

        .media-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .media-btn {
            flex: 0 0 auto;
            width: 100px;
            aspect-ratio: 1;
            background: #d5ddd5;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            color: #666;
            border: none;
            font-family: inherit;
            cursor: pointer;
        }

        .media-btn:active {
            opacity: 0.85;
        }

        .media-btn--add {
            border: 1px dashed #aaa;
        }

        .media-btn__icon {
            font-size: 22px;
        }

        .media-preview {
            position: relative;
            width: 100px;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .media-preview__img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .media-preview__remove {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            color: #fff;
            border: none;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
        }

        .hw-photo-input {
            display: none;
        }

        /* 我的作业列表 */
        .myHwItem {
            background: #fff;
            margin: 12px;
            padding: 16px;
            border-radius: 12px;
        }

        .myHwItem img {
            max-width: 100px;
            border-radius: 6px;
            margin-top: 8px;
            display: block;
        }

        .toWall {
            text-align: center;
            padding: 16px;
            color: #4CAF50;
            cursor: pointer;
        }

        /* 课程优秀作品：2列瀑布 */
        .waterfall {
            column-count: 2;
            column-gap: 10px;
            padding: 10px;
        }

        .workCard {
            break-inside: avoid;
            background: #fff;
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .workCard:active {
            transform: scale(0.98);
        }

        .workImg {
            width: 100%;
            background-size: cover;
            background-position: center;
        }

        .workImg img {
            width: 100%;
            display: block;
        }

        .workInfo {
            padding: 8px;
            font-size: 12px;
        }

        .workUser {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .workDesc {
            color: #666;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .workActions {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #999;
        }

        .like-btn {
            cursor: pointer;
            transition: all 0.2s;
        }

        .like-btn.liked {
            color: #ff4757;
        }

        /* ✅ 小红书风格作品详情页 */
        .detail-header {
            /* 顶部导航常驻，详情标题下移避开top-nav */
            position: fixed;
            top: 44px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: var(--app-max-width, 430px);
            height: 50px;
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
        }

        .detail-content {
            padding-top: 50px;
            padding-bottom: 75px;
        }

        .detail-img {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            display: block;
            background: #000;
        }

        .detail-author {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #fff;
        }

        .author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
        }

        .author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-name {
            font-weight: 500;
            flex: 1;
        }

        .follow-btn {
            background: #ff4757;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
        }

        .follow-btn.followed {
            background: #e8e8e8;
            color: #666;
        }

        .detail-actions {
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            background: #fff;
            border-top: 1px solid #f5f5f5;
            border-bottom: 1px solid #f5f5f5;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #333;
            cursor: pointer;
        }

        .action-item .icon {
            font-size: 22px;
        }

        .action-item.liked .icon {
            color: #ff4757;
        }

        .action-item.collected .icon {
            color: #ffb300;
        }

        .detail-desc {
            padding: 16px;
            background: #fff;
            margin-bottom: 12px;
        }

        .comments-title {
            padding: 12px 16px;
            font-weight: 500;
            background: #fff;
            border-bottom: 1px solid #f5f5f5;
        }

        .comment-item {
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            gap: 12px;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .comment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .comment-content {
            flex: 1;
        }

        .comment-user {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .comment-text {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .comment-time {
            font-size: 12px;
            color: #999;
        }

        /* 底部评论输入框 */
        .comment-input-bar {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: var(--app-max-width, 430px);
            background: #fff;
            padding: 10px 16px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            align-items: center;
            /* 作品墙页面：上移5px，紧贴底部导航上方 */
            bottom: 65px;
        }
        /* 详情页激活，底部导航隐藏，输入框贴屏幕最底部 */
        #pageWorkDetail.active .comment-input-bar {
            bottom: 0;
        }

        .comment-input {
            flex: 1;
            border: 1px solid #eee;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            outline: none;
        }

        .send-btn {
            background: #4CAF50;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }

        /* 关键：详情页只隐藏底部导航，顶部导航保留 */
        body:has(#pageWorkDetail.active) .global-bottom-nav {
            display: none !important;
        }
    </style>
</head>
<body data-active-module="wanhua">
    <!-- 顶部导航 -->
    <div class="top-nav">
        <div class="top-nav-item" onclick="window.location.href='index.html'">课程总览</div>
        <div class="top-nav-item active">学习中心</div>
        <div class="top-nav-item" onclick="window.location.href='work.html'">作品墙</div>
        <div class="top-nav-item" onclick="window.location.href='order.html'">我的订单</div>
    </div>

    <!-- 底部导航栏 -->
        <nav class="global-bottom-nav">
        <button type="button" class="nav-item" data-nav-module="baixiaotang"><span class="nav-icon">💡</span><span>百晓堂</span></button>
        <button type="button" class="nav-item active" data-nav-module="wanhua"><span class="nav-icon">📺</span><span>万花筒</span></button>
        <button type="button" class="nav-item" data-nav-module="gongxuetang"><span class="nav-icon">🌿</span><span>共学堂</span></button>
        <button type="button" class="nav-item" data-nav-module="chuanjia"><span class="nav-icon">📤</span><span>传家录</span></button>
        <button type="button" class="nav-item" data-nav-module="ziliudi"><span class="nav-icon">🏠</span><span>自留地</span></button>
    </nav>

    <!-- 学习主页 -->
    <div id="pageLearn" class="page active">
        <div class="header">
            <div class="back-btn" onclick="window.location.href='index.html'">←</div>
            <div class="header-title" id="courseTitle">课程学习</div>
            <div></div>
        </div>
        <div class="video">
            <img src="wwanhuatong/shipin.png" alt="课程视频封面" onerror="this.style.display='none'">
        </div>
        <div class="course-progress-card">
            <div class="progress-header">
                <span class="progress-label">课程进度</span>
                <span class="progress-text" id="progressText">已学 0/0 节</span>
            </div>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressBarFill" style="width:0%"></div>
            </div>
        </div>
        <div class="section">
            <span class="section-title-text">学习内容</span>
            <button class="hwBtn" id="goHw">查看作业</button>
        </div>
        <div class="chapter-list" id="chapterList"></div>
    </div>

    <!-- 作业详情 -->
    <div id="pageHomework" class="page">
        <div class="header">
            <div class="back-btn" onclick="show('pageLearn')">←</div>
            <div class="header-title">本课作业</div>
            <div></div>
        </div>
        <div class="hwCard">
            <div style="display:flex;gap:12px;align-items:center;">
                <div class="teacher-avatar">
                    <img src="wwanhuatong/wanhuatongtouxiang.jpg" alt="张美丽老师" onerror="this.style.display='none'">
                </div>
                <div><strong>张美丽</strong><span style="background:#ffc107;font-size:10px;padding:2px 5px;border-radius:4px;margin-left:6px;">班主任</span><div style="font-size:12px;color:#999;">今天 10:30</div></div>
                <div style="margin-left:auto;color:#4CAF50;">已查看</div>
            </div>
            <div style="font-weight:bold;margin:16px 0 8px;font-size:18px;">周末作业</div>

        <div class="excellent-entry" id="goCourseWall">
            <span>🏅优秀作业</span>
            <span id="excellentCount">4个 ></span>
        </div>
        <button class="submitBtn" id="goSubmit">提交作业</button>
    </div>

    <!-- 提交作业 -->
    <div id="pageSubmit" class="page">
        <div class="header">
            <div class="back-btn" onclick="show('pageHomework')">←</div>
            <div class="header-title">提交作业</div>
            <button id="submit" style="background:none;border:none;color:#4CAF50;font-size:16px;">提交</button>
        </div>
        <div class="submit-form-wrap">
            <div class="input-card">
                <textarea id="content" class="input-card__textarea" placeholder="请输入作业描述..."></textarea>
                <div class="media-row" id="hwMediaRow">
                    <button type="button" class="media-btn media-btn--add" id="upImg">
                        <span class="media-btn__icon">📷</span>添加照片
                    </button>
                </div>
                <input type="file" id="imgFile" class="hw-photo-input" accept="image/*">
            </div>
        </div>
    </div>

    <!-- 我的过往作业 -->
    <div id="pageMyHwList" class="page">
        <div class="header">
            <div class="back-btn" onclick="show('pageLearn')">←</div>
            <div class="header-title">我的作业</div>
            <div></div>
        </div>
        <div id="myHwContainer"></div>
        <div class="toWall" onclick="show('pageCourseWall')">查看课程优秀作品墙</div>
    </div>

    <!-- 课程优秀作品墙 -->
    <div id="pageCourseWall" class="page">
        <div class="header">
            <div class="back-btn" onclick="show('pageHomework')">←</div>
            <div class="header-title">优秀作品</div>
            <div></div>
        </div>
        <div class="waterfall" id="wallContainer"></div>
    </div>

    <!-- ✅ 小红书风格作品详情页 -->
    <div id="pageWorkDetail" class="page">
        <div class="detail-header">
            <div class="back-btn" onclick="show(detailBackPage)">←</div>
            <div class="header-title">作品详情</div>
           
        </div>
        <div class="detail-content">
            <img id="detailImg" class="detail-img" src="" alt="作品大图">
            <div class="detail-author">
                <div class="author-avatar">
                    <img id="detailAuthorAvatar" src="wwanhuatong/wanhuatongtouxiang.jpg" alt="作者头像">
                </div>
                <div class="author-name" id="detailAuthorName"></div>
                <button class="follow-btn" id="detailFollowBtn" type="button">+ 关注</button>
            </div>
            <div class="detail-actions">
                <div class="action-item" id="detailLikeBtn">
                    <span class="icon">🤍</span>
                    <span id="detailLikeCount">0</span>
                </div>
                <div class="action-item" id="detailCommentBtn">
                    <span class="icon">💬</span>
                    <span id="detailCommentCount">0</span>
                </div>
                <div class="action-item" id="detailCollectBtn">
                    <span class="icon">⭐</span>
                    <span id="detailCollectText">收藏</span>
                </div>
                <div class="action-item" id="detailShareBtn">
                    <span class="icon">↗️</span>
                    <span>分享</span>
                </div>
            </div>
            <div class="detail-desc" id="detailDesc"></div>
            <div class="comments-title">评论区</div>
            <div id="commentList"></div>
        </div>
        <div class="comment-input-bar">
            <input type="text" class="comment-input" id="commentInput" placeholder="说点什么...">
            <button class="send-btn" id="sendCommentBtn">发送</button>
        </div>
    </div>

    <script src="wht-toast.js"></script>
    <script>
        // 全局数据
        const course = localStorage.getItem('currentStudyCourse') || '水彩画入门课10节';
        const user = '李同学';
        let currentImgBase64 = '';
        let currentWorkOriginalIndex = -1;
        let detailBackPage = 'pageCourseWall';

        const CN_CHAPTER_NUMS = ['一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];

        const courseCurriculum = {
            '水彩画入门课10节': [
                {
                    title: '基础入门',
                    lessons: [
                        { icon: '🎨', title: '认识水彩工具', duration: '12分钟' },
                        { icon: '🖌️', title: '调色基础', duration: '15分钟' },
                        { icon: '🌊', title: '湿画法练习', duration: '18分钟' }
                    ]
                },
                {
                    title: '技法进阶',
                    lessons: [

        function getCourseChapters() {
            return courseCurriculum[course] || courseCurriculum['水彩画入门课10节'];
        }

        const PROGRESS_STORAGE_KEY = 'whtStudyProgress';

        function getLessonKey(chapterIndex, lessonIndex) {
            return chapterIndex + '-' + lessonIndex;
        }

        function getCourseProgress() {
            const all = JSON.parse(localStorage.getItem(PROGRESS_STORAGE_KEY) || '{}');
            return all[course] || [];
        }

        function saveCourseProgress(completedList) {
            const all = JSON.parse(localStorage.getItem(PROGRESS_STORAGE_KEY) || '{}');
            all[course] = completedList;
            localStorage.setItem(PROGRESS_STORAGE_KEY, JSON.stringify(all));
        }

        function isLessonComplete(chapterIndex, lessonIndex) {
            return getCourseProgress().includes(getLessonKey(chapterIndex, lessonIndex));
        }

        function markLessonComplete(chapterIndex, lessonIndex) {
            const key = getLessonKey(chapterIndex, lessonIndex);
            const progress = getCourseProgress();
            if (progress.includes(key)) return false;
            progress.push(key);
            saveCourseProgress(progress);
            return true;
        }

        function getTotalLessons() {
            return getCourseChapters().reduce(function(sum, ch) {
                return sum + ch.lessons.length;
            }, 0);
        }

        function getCompletedCount() {
            return getCourseProgress().length;
        }

        function getChapterCompletedCount(chapterIndex) {
            const chapters = getCourseChapters();
            const chapter = chapters[chapterIndex];
            if (!chapter) return 0;
            let count = 0;
            for (let i = 0; i < chapter.lessons.length; i++) {
                if (isLessonComplete(chapterIndex, i)) count++;
            }
            return count;
        }

        function updateProgressUI() {
            const total = getTotalLessons();
            const done = getCompletedCount();
            const percent = total ? Math.round(done / total * 100) : 0;
            const progressText = document.getElementById('progressText');
            const progressBarFill = document.getElementById('progressBarFill');
            if (progressText) {
                progressText.innerText = '已学 ' + done + '/' + total + ' 节';
            }
            if (progressBarFill) {
                progressBarFill.style.width = percent + '%';
            }
        }

        function renderChapterList() {
            const chapters = getCourseChapters();
            const container = document.getElementById('chapterList');

            container.innerHTML = chapters.map(function(ch, chapterIndex) {
                const chapterNum = CN_CHAPTER_NUMS[chapterIndex] || String(chapterIndex + 1);
                const chapterDone = getChapterCompletedCount(chapterIndex);
                const lessonsHtml = ch.lessons.map(function(lesson, lessonIndex) {
                    const completed = isLessonComplete(chapterIndex, lessonIndex);
                    return `
                        <div class="lesson${completed ? ' completed' : ''}" data-chapter="${chapterIndex}" data-lesson="${lessonIndex}">
                            <span class="lesson-icon">${lesson.icon || '📖'}</span>
                            <div class="lesson-info">
                                <div class="lesson-title">第${lessonIndex + 1}节 ${lesson.title}</div>
                                ${lesson.duration ? `<div class="lesson-duration">${lesson.duration}</div>` : ''}
                            </div>
                            <span class="lesson-status ${completed ? 'done' : 'todo'}">${completed ? '✓ 已学' : '未学'}</span>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="chapter-block" data-chapter="${chapterIndex}">
                        <div class="chapter-header">
                            <span class="chapter-index">第${chapterNum}章</span>
                            <span class="chapter-title">${ch.title}</span>
                            <span class="chapter-progress">已学${chapterDone}/${ch.lessons.length}节</span>
                            <span class="chapter-arrow">▼</span>
                        </div>
                        <div class="chapter-lessons">${lessonsHtml}</div>
                    </div>
                `;
            }).join('');

            container.querySelectorAll('.chapter-header').forEach(function(header) {
                header.addEventListener('click', function() {
                    const block = header.closest('.chapter-block');
                    if (block) block.classList.toggle('expanded');
                });
            });

            container.querySelectorAll('.lesson').forEach(function(item) {
                item.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const chapterIndex = parseInt(this.dataset.chapter, 10);
                    const lessonIndex = parseInt(this.dataset.lesson, 10);
                    openLesson(chapterIndex, lessonIndex);
                });
            });

            updateProgressUI();
        }

        function openLesson(chapterIndex, lessonIndex) {
            const chapters = getCourseChapters();
            const chapter = chapters[chapterIndex];
            const lesson = chapter && chapter.lessons[lessonIndex];
            if (!lesson) return;

            const isNew = markLessonComplete(chapterIndex, lessonIndex);
            renderChapterList();

            if (isNew) {
                showWhtToast('已开始学习：' + lesson.title);
            } else {
                showWhtToast('继续学习：' + lesson.title);
            }
        }

        function getWallDefaultsForCourse(courseName) {
            return WALL_WORK_TEMPLATES.map(function(item) {

            });

        function ensureCourseWallDefaults() {
            let hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const defaults = getWallDefaultsForCourse(course);
            let changed = false;

            defaults.forEach(function(def) {
                const exists = hwList.some(function(h) {
                    return h.course === course && h.img === def.img;
                });
                if (!exists) {
                    hwList.push(def);
                    changed = true;
                }
            });

            if (changed) {
                localStorage.setItem('hwList', JSON.stringify(hwList));
            }
        }

        function getCourseWallDisplayWorks() {
            ensureCourseWallDefaults();
            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const defaults = getWallDefaultsForCourse(course);

            return defaults.map(function(def) {
                const originalIndex = hwList.findIndex(function(h) {
                    return h.course === course && h.img === def.img;
                });
                if (originalIndex === -1) return null;
                return Object.assign({}, hwList[originalIndex], { originalIndex: originalIndex });
            }).filter(Boolean);
        }

            return getCourseWallDisplayWorks().length;

            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const work = hwList[originalIndex];
            
            if (typeof work.likeCount === 'undefined') work.likeCount = 0;
            if (typeof work.isLiked === 'undefined') work.isLiked = false;
            
            if (work.isLiked) {
                work.likeCount--;

                row.insertBefore(wrap, addBtn);
            }

            // 达到上限时隐藏添加按钮
            addBtn.style.display = currentImgBase64 ? 'none' : '';
        }

        // 处理文件选择
        document.getElementById('imgFile').onchange = function(e) {
            const file = e.target.files[0];
            e.target.value = ''; // 清空以允许重复选择同一文件
            if (!file) return;

            if (currentImgBase64) {
                showWhtToast('最多添加 ' + MAX_HW_PHOTOS + ' 张照片');
                return;
            }

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(res) {
                currentImgBase64 = res.target.result;
                renderHwPhotos();
                showWhtToast('照片已添加');
            };
        };

        // 提交作业
        document.getElementById('submit').onclick = () => {
            const content = document.getElementById('content').value.trim();
            if (!content) {
                showWhtToast('请填写作业内容');
                return;
            }
            
            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            hwList.unshift({
                user: user,
                course: course,
                content: content,
                img: currentImgBase64,
                time: new Date().toLocaleString(),
                likeCount: 0,
                isLiked: false,
                isCollected: false,
                comments: []
            });
            
            localStorage.setItem('hwList', JSON.stringify(hwList));
            showWhtToast('提交成功');
            
            // 重置表单
            currentImgBase64 = '';
            renderHwPhotos();
            document.getElementById('content').value = '';
            
            // 跳转到我的作业列表
            renderMyHw();
            show('pageMyHwList');
        };

        // ========== 全局事件绑定 ==========
        document.getElementById('goHw').onclick = () => show('pageHomework');
        document.getElementById('goSubmit').onclick = () => show('pageSubmit');
        document.getElementById('goCourseWall').onclick = () => show('pageCourseWall');
        document.getElementById('upImg').onclick = () => document.getElementById('imgFile').click();
        
        // 详情页功能按钮
        document.getElementById('detailLikeBtn').onclick = function() {
            if (currentWorkOriginalIndex !== -1) {
                toggleLike(currentWorkOriginalIndex);
            }
        };

        document.getElementById('detailFollowBtn').onclick = function() {
            if (currentWorkOriginalIndex === -1) return;
            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const work = hwList[currentWorkOriginalIndex];
            if (work && work.user !== user) {
                toggleFollowAuthor(work.user);
            }
        };

        document.getElementById('detailCollectBtn').onclick = function() {
            if (currentWorkOriginalIndex !== -1) {
                toggleCollect(currentWorkOriginalIndex);
            }
        };

        document.getElementById('detailShareBtn').onclick = function() {
            if (currentWorkOriginalIndex === -1) return;
            const hwList = JSON.parse(localStorage.getItem('hwList') || '[]');
            const work = hwList[currentWorkOriginalIndex];
            if (work) {
                shareWork(work);
            }
        };

        document.getElementById('detailCommentBtn').onclick = function() {
            const list = document.getElementById('commentList');
            if (list) {
                list.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            document.getElementById('commentInput').focus();
        };
        
        // 发送评论按钮
        document.getElementById('sendCommentBtn').onclick = submitComment;
        
        // 回车发送评论
        document.getElementById('commentInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                submitComment();
            }
        });

        // ========== 页面初始化 ==========
        document.addEventListener('DOMContentLoaded', function() {
            // 游客拦截（如果有认证系统）
            if (window.XueWuyaAuth && XueWuyaAuth.blockGuestPage('index.html')) return;
            
            // 初始化数据
            initDefaultWorks();
            migrateAllOldData();
            
            // 设置页面标题
            document.getElementById('courseTitle').innerText = course;
            
            // 渲染所有初始内容
            renderChapterList();
            renderMyHw();
            updateExcellentEntry();
            renderHwPhotos();
        });
    </script>
    <script src="../js/voice-mode.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
</body>
</html>
