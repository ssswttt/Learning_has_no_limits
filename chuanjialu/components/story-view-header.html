<header class="story-view-header">
  <a class="story-view-header__back" href="{{backHref}}">←</a>
  <h1 class="story-view-header__title">{{title}}</h1>
  <div class="story-view-header__actions">
    <button type="button" class="story-view-header__edit" id="memoirViewEditBtn" hidden>编辑</button>
    <button type="button" class="story-view-header__delete" id="memoirViewDeleteBtn" hidden>删除</button>
    <button type="button" class="story-view-header__share">分享</button>
  </div>
</header>
