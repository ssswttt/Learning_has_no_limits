<header class="editor-header">
  <a class="editor-header__cancel" href="{{cancelHref}}">取消</a>
  <div class="editor-header__center">
    <h1 class="editor-header__title">{{title}}</h1>
    <p class="editor-header__hint" data-autosave-hint>✓ 已自动保存至草稿</p>
  </div>
  <div class="editor-header__actions">
    <button type="button" class="editor-header__btn editor-header__btn--save" data-action="memoir-save">保存</button>
    <button type="button" class="editor-header__btn" data-action="memoir-export">导出</button>
    <button type="button" class="editor-header__btn" data-action="memoir-collaborate">协作</button>
  </div>
</header>
